[alembic]
script_location = alembic
# sqlalchemy.url is dynamically overridden by alembic/env.py using DATABASE_URL from .env
sqlalchemy.url = postgresql://user:password@localhost:5432/shafsky_db

[loggers]
keys = root,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
